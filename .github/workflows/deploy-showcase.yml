name: Deploy Showcase

on:
  push:
    branches: [main]
    paths:
      - 'apps/showcase/**'
      - 'apps/example-*/**'
      - 'layers/narduk-nuxt-layer/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NUXT_TELEMETRY_DISABLED: 1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    strategy:
      matrix:
        app:
          [
            showcase,
            example-auth,
            example-blog,
            example-marketing,
            example-og-image,
            example-apple-maps,
          ]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check Doppler Token
        id: check_doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          if [ -n "$DOPPLER_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch Doppler Secrets
        if: steps.check_doppler.outputs.has_token == 'true'
        uses: dopplerhq/secrets-fetch-action@v1.3.1
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Prepare Cloudflare Tokens
        env:
          FALLBACK_API: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          FALLBACK_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] && [ -n "$FALLBACK_API" ]; then
            echo "CLOUDFLARE_API_TOKEN=$FALLBACK_API" >> "$GITHUB_ENV"
            echo "CLOUDFLARE_ACCOUNT_ID=$FALLBACK_ACCOUNT" >> "$GITHUB_ENV"
          fi

          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && [ -z "$FALLBACK_API" ] || [ -z "$FALLBACK_ACCOUNT" ]; then
            echo "Error: CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is completely missing from both Doppler and GitHub Secrets."
            exit 1
          fi

      - name: Build and Deploy ${{ matrix.app }}
        working-directory: apps/${{ matrix.app }}
        run: |
          pnpm build
          pnpm exec wrangler deploy
