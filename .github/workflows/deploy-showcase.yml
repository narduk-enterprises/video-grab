name: Deploy Showcase

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/showcase/**'
      - 'apps/example-*/**'
      - 'layers/narduk-nuxt-layer/**'

concurrency:
  group: deploy-showcase-${{ github.ref }}
  cancel-in-progress: true

env:
  NUXT_TELEMETRY_DISABLED: 1

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      method: ${{ steps.creds.outputs.method }}
    steps:
      - name: Validate deployment credentials
        id: creds
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          CF_API: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$DOPPLER_TOKEN" ]; then
            echo "method=doppler" >> "$GITHUB_OUTPUT"
            echo "✓ Using Doppler (hub-and-spoke) for secret resolution"
          elif [ -n "$CF_API" ] && [ -n "$CF_ACCOUNT" ]; then
            echo "method=direct" >> "$GITHUB_OUTPUT"
            echo "✓ Using direct Cloudflare credentials"
          else
            echo "::error::No deployment credentials configured."
            echo "Set DOPPLER_TOKEN (recommended) or CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi

  # Phase 1: Deploy all example apps in parallel
  deploy-apps:
    name: Deploy ${{ matrix.app }}
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write
    strategy:
      fail-fast: false
      matrix:
        app:
          - example-auth
          - example-blog
          - example-marketing
          - example-og-image
          - example-apple-maps
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Fetch secrets from Doppler
        if: needs.preflight.outputs.method == 'doppler'
        uses: dopplerhq/secrets-fetch-action@v1.3.1
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Set direct Cloudflare credentials
        if: needs.preflight.outputs.method == 'direct'
        env:
          CF_API: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "CLOUDFLARE_API_TOKEN=$CF_API" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=$CF_ACCOUNT" >> "$GITHUB_ENV"

      - name: Validate Cloudflare credentials
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Cloudflare credentials missing after secret resolution."
            exit 1
          fi

      - name: Build & Deploy
        working-directory: apps/${{ matrix.app }}
        run: |
          pnpm build
          pnpm exec wrangler deploy

  # Phase 2: Deploy showcase AFTER all example apps (it has Service Bindings to them)
  deploy-showcase:
    name: Deploy showcase
    needs: [preflight, deploy-apps]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Fetch secrets from Doppler
        if: needs.preflight.outputs.method == 'doppler'
        uses: dopplerhq/secrets-fetch-action@v1.3.1
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Set direct Cloudflare credentials
        if: needs.preflight.outputs.method == 'direct'
        env:
          CF_API: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "CLOUDFLARE_API_TOKEN=$CF_API" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=$CF_ACCOUNT" >> "$GITHUB_ENV"

      - name: Validate Cloudflare credentials
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Cloudflare credentials missing after secret resolution."
            exit 1
          fi

      - name: Build & Deploy
        working-directory: apps/showcase
        run: |
          pnpm build
          pnpm exec wrangler deploy
