name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'layers/**'
      - '**/*.md'
      - '.github/workflows/deploy-showcase.yml'
      - '.github/workflows/publish-layer.yml'
      - '.github/workflows/version-bump.yml'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NUXT_TELEMETRY_DISABLED: 1

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write
    steps:
      # ── Preflight: validate credentials before expensive setup ──
      - name: Preflight — validate credentials
        id: creds
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          CF_API: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$DOPPLER_TOKEN" ]; then
            echo "method=doppler" >> "$GITHUB_OUTPUT"
            echo "✓ Using Doppler (hub-and-spoke) for secret resolution"
          elif [ -n "$CF_API" ] && [ -n "$CF_ACCOUNT" ]; then
            echo "method=direct" >> "$GITHUB_OUTPUT"
            echo "✓ Using direct Cloudflare credentials"
          else
            echo "::error::No deployment credentials configured."
            echo ""
            echo "Configure one of the following as GitHub repository secrets:"
            echo "  1. DOPPLER_TOKEN (recommended) — resolves all secrets including Cloudflare via hub refs"
            echo "  2. CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID — direct Cloudflare credentials"
            echo ""
            echo "For Doppler setup, run: pnpm setup -- --name=<app> --display=<name> --url=<url>"
            exit 1
          fi

      # ── Toolchain ──
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # ── Secret resolution ──
      - name: Fetch secrets from Doppler
        if: steps.creds.outputs.method == 'doppler'
        uses: dopplerhq/secrets-fetch-action@v1.3.1
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Set direct Cloudflare credentials
        if: steps.creds.outputs.method == 'direct'
        env:
          CF_API: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "CLOUDFLARE_API_TOKEN=$CF_API" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=$CF_ACCOUNT" >> "$GITHUB_ENV"

      # ── Validate Cloudflare tokens are present after resolution ──
      - name: Validate Cloudflare credentials
        env:
          DEPLOY_METHOD: ${{ steps.creds.outputs.method }}
        run: |
          missing=()
          [ -z "$CLOUDFLARE_API_TOKEN" ] && missing+=("CLOUDFLARE_API_TOKEN")
          [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && missing+=("CLOUDFLARE_ACCOUNT_ID")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing Cloudflare credentials after secret resolution: ${missing[*]}"
            if [ "$DEPLOY_METHOD" = "doppler" ]; then
              echo ""
              echo "Doppler connected successfully but Cloudflare tokens are not in the spoke project."
              echo "Add hub references to your Doppler spoke project (prd config):"
              echo ""
              echo "  doppler secrets set CLOUDFLARE_API_TOKEN='\${narduk-enterprise-apps.prd.CLOUDFLARE_API_TOKEN}' --config prd"
              echo "  doppler secrets set CLOUDFLARE_ACCOUNT_ID='\${narduk-enterprise-apps.prd.CLOUDFLARE_ACCOUNT_ID}' --config prd"
            fi
            exit 1
          fi
          echo "✓ Cloudflare credentials validated"

      # ── Build & Deploy ──
      - name: Build
        working-directory: apps/web
        run: pnpm build

      - name: Deploy to Cloudflare Workers
        working-directory: apps/web
        run: pnpm exec wrangler deploy
