name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
    paths-ignore:
      - 'layers/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NUXT_TELEMETRY_DISABLED: 1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache Nuxt build
        uses: actions/cache@v4
        with:
          path: |
            apps/web/.nuxt
            apps/web/.output
            node_modules/.cache
          key: nuxt-build-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/app/**', 'apps/web/server/**', 'apps/web/nuxt.config.ts') }}
          restore-keys: |
            nuxt-build-${{ hashFiles('pnpm-lock.yaml') }}-
            nuxt-build-

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      # All secrets from the app's Doppler spoke project (prd config) are resolved —
      # including cross-project hub references — and injected into $GITHUB_ENV.
      # This makes CLOUDFLARE_API_TOKEN, NUXT_* keys, etc. available to Build & Deploy.
      # Using secrets-fetch-action automatically masks retrieved secrets in logs.
      - name: Check Doppler Token
        id: check_doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          if [ -n "$DOPPLER_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch Doppler Secrets
        if: steps.check_doppler.outputs.has_token == 'true'
        uses: dopplerhq/secrets-fetch-action@v1.3.1
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Prepare Cloudflare Tokens
        env:
          FALLBACK_API: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          FALLBACK_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] && [ -n "$FALLBACK_API" ]; then
            echo "CLOUDFLARE_API_TOKEN=$FALLBACK_API" >> "$GITHUB_ENV"
            export CLOUDFLARE_API_TOKEN=$FALLBACK_API
          fi

          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && [ -n "$FALLBACK_ACCOUNT" ]; then
            echo "CLOUDFLARE_ACCOUNT_ID=$FALLBACK_ACCOUNT" >> "$GITHUB_ENV"
            export CLOUDFLARE_ACCOUNT_ID=$FALLBACK_ACCOUNT
          fi

          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Error: CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is completely missing."
            exit 1
          fi

      - name: Build and Deploy
        working-directory: apps/web
        run: |
          pnpm run build
          pnpm exec wrangler deploy
