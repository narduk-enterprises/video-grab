name: Version Bump

on:
  push:
    branches: [main]

jobs:
  bump:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type
        id: bump
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qiE 'BREAKING CHANGE|^[a-z]+(\(.*\))?!:'; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -qiE '^feat(\(.*\))?:'; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump root version
        run: npm version ${{ steps.bump.outputs.type }} --no-git-tag-version

      - name: Sync version to all workspaces (excluding layers)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # Layers have independent versioning (publish-layer.yml handles layer bumps).
          # Only sync to apps/ and packages/ that actually exist.
          for pkg in apps/*/package.json packages/*/package.json; do
            [ -f "$pkg" ] || continue
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$pkg', 'utf8'));
              if (p.private === false) process.exit(0); // Skip publishable packages with own versioning
              p.version = '$VERSION';
              fs.writeFileSync('$pkg', JSON.stringify(p, null, 2) + '\n');
            "
          done

      - name: Commit and tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump to v${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push
          git push --tags
