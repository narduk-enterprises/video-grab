name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NUXT_TELEMETRY_DISABLED: 1

jobs:
  # ── Shared setup: install, build plugins, prepare types, cache ──

  setup:
    name: Prepare Workspace
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build ESLint plugins
        run: pnpm run build:plugins

      - name: Prepare Nuxt types
        run: |
          for cfg in apps/*/nuxt.config.ts layers/*/nuxt.config.ts; do
            [ -f "$cfg" ] || continue
            dir="$(dirname "$cfg")"
            echo "::group::nuxt prepare — $dir"
            (cd "$dir" && pnpm exec nuxt prepare)
            echo "::endgroup::"
          done

      - name: Cache prepared workspace
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            layers/*/node_modules
            packages/*/node_modules
            packages/eslint-config/*/node_modules
            apps/*/.nuxt
            layers/*/.nuxt
            packages/eslint-config/*/dist
            packages/eslint-config/eslint-plugin-nuxt-guardrails/dist
            packages/eslint-config/eslint-plugin-nuxt-ui/dist
            packages/eslint-config/eslint-plugin-vue-official-best-practices/dist
          key: workspace-${{ github.sha }}

  # ── Parallel quality jobs ──

  lint:
    name: Lint
    needs: [setup]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            layers/*/node_modules
            packages/*/node_modules
            packages/eslint-config/*/node_modules
            apps/*/.nuxt
            layers/*/.nuxt
            packages/eslint-config/*/dist
            packages/eslint-config/eslint-plugin-nuxt-guardrails/dist
            packages/eslint-config/eslint-plugin-nuxt-ui/dist
            packages/eslint-config/eslint-plugin-vue-official-best-practices/dist
          key: workspace-${{ github.sha }}

      - name: Lint
        run: pnpm -r run lint

  typecheck:
    name: Typecheck
    needs: [setup]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            layers/*/node_modules
            packages/*/node_modules
            packages/eslint-config/*/node_modules
            apps/*/.nuxt
            layers/*/.nuxt
            packages/eslint-config/*/dist
            packages/eslint-config/eslint-plugin-nuxt-guardrails/dist
            packages/eslint-config/eslint-plugin-nuxt-ui/dist
            packages/eslint-config/eslint-plugin-vue-official-best-practices/dist
          key: workspace-${{ github.sha }}

      - name: Typecheck
        run: pnpm -r run typecheck

  test:
    name: Unit Tests
    needs: [setup]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            layers/*/node_modules
            packages/*/node_modules
            packages/eslint-config/*/node_modules
            apps/*/.nuxt
            layers/*/.nuxt
            packages/eslint-config/*/dist
            packages/eslint-config/eslint-plugin-nuxt-guardrails/dist
            packages/eslint-config/eslint-plugin-nuxt-ui/dist
            packages/eslint-config/eslint-plugin-vue-official-best-practices/dist
          key: workspace-${{ github.sha }}

      - name: Unit Tests
        run: pnpm -r --if-present test:unit

  # ── Deploy pipeline DISABLED ──
  # Deployment is done locally via `pnpm run deploy` (wrangler deploy).
  # CI is quality-only to conserve GitHub Actions minutes.
  # See .agents/workflows/deploy.md for the local deploy workflow.
