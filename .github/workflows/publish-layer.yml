name: Publish Layer

on:
  push:
    branches: [main]
    paths:
      - 'layers/narduk-nuxt-layer/**'

concurrency:
  group: publish-layer
  cancel-in-progress: true

jobs:
  publish:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Determine version bump type
        id: bump
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if echo "$COMMIT_MSG" | grep -qiE 'BREAKING CHANGE|^[a-z]+(\(.*\))?!:'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMIT_MSG" | grep -qiE '^feat(\(.*\))?:'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi
          echo "Bump type: $(grep type "$GITHUB_OUTPUT" | cut -d= -f2)"

      - name: Bump version
        working-directory: layers/narduk-nuxt-layer
        run: |
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version
          echo "LAYER_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: Append to CHANGELOG
        working-directory: layers/narduk-nuxt-layer
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          DATE=$(date +%Y-%m-%d)
          ENTRY="## v${LAYER_VERSION} ($DATE)

          - ${COMMIT_MSG} (${COMMIT_SHA:0:7})
          "

          if [ -f CHANGELOG.md ]; then
            # Prepend new entry after the title line
            EXISTING=$(cat CHANGELOG.md)
            echo -e "# Changelog\n\n${ENTRY}\n${EXISTING#*$'\n'}" > CHANGELOG.md
          else
            echo -e "# Changelog\n\n${ENTRY}" > CHANGELOG.md
          fi

      - name: Publish to GitHub Packages
        working-directory: layers/narduk-nuxt-layer
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm publish --no-git-checks

      - name: Commit version bump and changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add layers/narduk-nuxt-layer/package.json layers/narduk-nuxt-layer/CHANGELOG.md
          git commit -m "chore: bump layer to v${LAYER_VERSION} [skip ci]"
          git tag "layer-v${LAYER_VERSION}"
          git push
          git push --tags
