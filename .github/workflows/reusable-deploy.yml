name: Reusable Deploy

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '22'
      app-directory:
        description: 'Relative path to the app directory (e.g., apps/web)'
        required: false
        type: string
        default: 'apps/web'
    secrets:
      DOPPLER_TOKEN:
        description: 'Doppler service token for secret resolution'
        required: false
      CLOUDFLARE_API_TOKEN:
        description: 'Direct Cloudflare API token (fallback if no Doppler)'
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        description: 'Cloudflare account ID (fallback if no Doppler)'
        required: false

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      method: ${{ steps.creds.outputs.method }}
    steps:
      - name: Validate credentials
        id: creds
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          CF_API: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$DOPPLER_TOKEN" ]; then
            echo "method=doppler" >> "$GITHUB_OUTPUT"
            echo "✓ Using Doppler (hub-and-spoke) for secret resolution"
          elif [ -n "$CF_API" ] && [ -n "$CF_ACCOUNT" ]; then
            echo "method=direct" >> "$GITHUB_OUTPUT"
            echo "✓ Using direct Cloudflare credentials"
          else
            echo "::error::No deployment credentials configured."
            echo "Configure DOPPLER_TOKEN (recommended) or CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi

  deploy:
    name: Deploy
    needs: [preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Fetch secrets from Doppler
        if: needs.preflight.outputs.method == 'doppler'
        uses: dopplerhq/secrets-fetch-action@v1.3.1
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Set direct Cloudflare credentials
        if: needs.preflight.outputs.method == 'direct'
        env:
          CF_API: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "CLOUDFLARE_API_TOKEN=$CF_API" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=$CF_ACCOUNT" >> "$GITHUB_ENV"

      - name: Validate Cloudflare credentials
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Cloudflare credentials missing after secret resolution."
            exit 1
          fi

      - name: Run D1 migrations (remote)
        working-directory: ${{ inputs.app-directory }}
        run: |
          if [ -f "package.json" ]; then
            cmd=$(node -p "require('./package.json').scripts['db:migrate']?.replace('--local', '--remote') || ''")
            if [ -n "$cmd" ]; then
              echo "Running remote migrations..."
              pnpm exec $cmd
            else
              echo "No db:migrate script found, skipping."
            fi
          fi

      - name: Build & Deploy
        working-directory: ${{ inputs.app-directory }}
        run: |
          pnpm build
          pnpm exec wrangler deploy
